<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <rect width="500" height="500" fill="#0F172A"/>
  <text x="20" y="30" fill="#38BDF8" font-size="14" font-family="monospace" font-weight="bold">Chest X-Ray - PA View</text>
  
  <!-- Chest outline -->
  <ellipse cx="250" cy="280" rx="180" ry="200" stroke="#334155" stroke-width="2" fill="#1E293B30"/>
  
  <!-- Lungs -->
  <ellipse cx="180" cy="270" rx="80" ry="120" stroke="#10B98130" stroke-width="1" fill="#10B98110"/>
  <ellipse cx="320" cy="270" rx="80" ry="120" stroke="#10B98130" stroke-width="1" fill="#10B98110"/>
  
  <!-- Heart shadow - enlarged -->
  <ellipse cx="230" cy="300" rx="70" ry="90" stroke="#EF444450" stroke-width="2" fill="#EF444420"/>
  <text x="170" y="260" fill="#EF4444" font-size="11" font-family="monospace">Enlarged</text>
  <text x="170" y="274" fill="#EF4444" font-size="11" font-family="monospace">Cardiac</text>
  <text x="170" y="288" fill="#EF4444" font-size="11" font-family="monospace">Silhouette</text>
  
  <!-- Normal heart outline for comparison -->
  <ellipse cx="230" cy="310" rx="50" ry="70" stroke="#10B98130" stroke-width="1" stroke-dasharray="5" fill="none"/>
  <text x="200" y="240" fill="#10B981" font-size="9" font-family="monospace">Normal size</text>
  
  <!-- Diaphragm -->
  <path d="M50,380 Q250,340 450,380" stroke="#64748B" stroke-width="1.5" fill="none"/>
  
  <!-- Ribs -->
  <path d="M80,200 Q250,180 420,200" stroke="#334155" stroke-width="0.5" fill="none"/>
  <path d="M70,230 Q250,210 430,230" stroke="#334155" stroke-width="0.5" fill="none"/>
  <path d="M65,260 Q250,240 435,260" stroke="#334155" stroke-width="0.5" fill="none"/>
  
  <text x="50" y="480" fill="#94A3B8" font-size="9" font-family="monospace">Cardiomegaly - No pulmonary edema - No consolidation</text>
</svg>
